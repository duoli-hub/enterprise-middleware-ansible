# ============================================================
# Ansible 全局配置文件
# 适用于企业级中间件自动化部署
# ============================================================

[defaults]

# --- 主机清单 ---
inventory      = inventory/production/hosts.ini
# 可被环境变量或命令行覆盖

# --- 并发与性能 ---
forks          = 30                          # 并发进程数，根据控制节点资源调整
timeout        = 60                          # SSH 连接超时（秒）
poll_interval  = 15                          # 异步任务轮询间隔

# --- SSH 连接配置 ---
remote_user    = root                        # 默认远程操作用户（可在 inventory 中覆盖）
host_key_checking = False                    # 首次连接不提示主机密钥确认（生产环境建议事先通过 ssh-keyscan 管理）
ssh_args       = -o ControlMaster=auto -o ControlPersist=120s
pipelining     = True                        # 减少 SSH 连接次数，需要远程主机 /etc/sudoers 关闭 requiretty
control_path   = /tmp/ansible-%%h-%%p-%%r    # SSH 连接复用路径

# --- 权限提升 ---
become         = True                        # 默认启用提权
become_method  = sudo
become_user    = root
become_ask_pass = False                     # 若部署脚本需要密码，应通过 --ask-become-pass 或 vault 传入

# --- 日志与输出 ---
log_path       = ./ansible.log               # 操作日志（按需开启）
display_skipped_hosts = False                # 在输出中不显示跳过的任务，使结果更简洁
stdout_callback = yaml                       # 使用 YAML 格式输出（可选：default、minimal、dense）
callbacks_enabled = profile_tasks            # 输出每个任务耗时统计

# --- 重试与错误处理 ---
retry_files_enabled = False                  # 禁用 .retry 文件（使用现代 CI/CD 时推荐关闭）
max_fail_percentage = 30                     # 超过该比例主机失败则停止执行，避免大面积故障
any_errors_fatal   = True                    # 任何主机出错立即终止 playbook（适用于严格顺序部署）

# --- 变量与模板 ---
ansible_managed = "此文件由 Ansible 管理，请勿手动修改 - {file} - {host} - {uid}"  # 模板注释标记
jinja2_extensions = jinja2.ext.do,jinja2.ext.i18n

# --- 角色与集合路径 ---
roles_path    = ./roles
collections_paths = ./collections:~/.ansible/collections:/usr/share/ansible/collections

# --- 加密 ---
vault_password_file = .vault_pass.txt       # 若存在则自动使用，避免交互式输入

# --- 其他 ---
deprecation_warnings = True                  # 显示弃用警告
inventory_ignore_extensions = ~,.orig,.bak,.cfg,.retry,.pyc,.swp,.tmp  # 忽略的清单文件后缀

# ============================================================
# SSH 连接高级调优
# ============================================================
[ssh_connection]
transfer_method = smart                      # 小文件用 ssh (sftp)，大文件通过 pipelining 或直接 scp
scp_if_ssh      = True
retries         = 3                          # 连接失败重试次数

# ============================================================
# 特权升级
# ============================================================
[privilege_escalation]

# ============================================================
# 加速模式 (已弃用，保留兼容)
# ============================================================
[accelerate]
accelerate_port = 5099
accelerate_timeout = 30
accelerate_connect_timeout = 5.0