# ============================================================
# 企业中间件生产环境主机清单
# 使用: 根据实际 IP 和主机名修改各段内容
# ============================================================
# 通用连接变量（可被单主机覆盖）
# ansible_user          SSH 登录用户（默认使用 ansible.cfg 中的 remote_user）
# ansible_port          SSH 端口（默认 22）
# ansible_ssh_private_key_file  私钥路径（免密登录时使用）
# ============================================================

# ==================== 系统调优（所有节点） ====================
# 所有主机均应安装基础依赖并执行通用系统调优，无需额外分组
# 可直接使用 all 组

# ==================== Redis 高可用集群（Sentinel） ====================
[redis_master]
redis-master-01 ansible_host=10.0.1.10

[redis_slave]
redis-slave-01 ansible_host=10.0.1.11
redis-slave-02 ansible_host=10.0.1.12

[redis_sentinel]
redis-sentinel-01 ansible_host=10.0.1.13
redis-sentinel-02 ansible_host=10.0.1.14
redis-sentinel-03 ansible_host=10.0.1.15

# ==================== MySQL 主从 + MHA 高可用 ====================
[mysql_master]
mysql-master-01 ansible_host=10.0.2.10 mysql_server_id=1

[mysql_slave]
mysql-slave-01 ansible_host=10.0.2.11 mysql_server_id=2
mysql-slave-02 ansible_host=10.0.2.12 mysql_server_id=3

# MHA Manager 节点（可与监控等共用）
[mysql_mha_manager]
mysql-mha-01 ansible_host=10.0.2.20

# ==================== Apache Kafka（KRaft 模式）====================
[kafka_brokers]
kafka-01 ansible_host=10.0.3.10 kafka_broker_id=1
kafka-02 ansible_host=10.0.3.11 kafka_broker_id=2
kafka-03 ansible_host=10.0.3.12 kafka_broker_id=3

# ==================== Apache RocketMQ（双主双从-同步） ====================
[rocketmq_namesrv]
rocketmq-ns-01 ansible_host=10.0.4.10
rocketmq-ns-02 ansible_host=10.0.4.11

[rocketmq_broker_master]
rocketmq-broker-a ansible_host=10.0.4.12 broker_name=broker-a broker_role=SYNC_MASTER
rocketmq-broker-b ansible_host=10.0.4.13 broker_name=broker-b broker_role=SYNC_MASTER

[rocketmq_broker_slave]
rocketmq-broker-a-s ansible_host=10.0.4.14 broker_name=broker-a broker_role=SLAVE
rocketmq-broker-b-s ansible_host=10.0.4.15 broker_name=broker-b broker_role=SLAVE

# RocketMQ 控制台（可选）
[rocketmq_console]
rocketmq-console-01 ansible_host=10.0.4.20

# ==================== RabbitMQ 集群 ====================
[rabbitmq]
rabbitmq-01 ansible_host=10.0.5.10
rabbitmq-02 ansible_host=10.0.5.11
rabbitmq-03 ansible_host=10.0.5.12

# ==================== Apache ZooKeeper 集群 ====================
[zookeeper]
zk-01 ansible_host=10.0.6.10 zk_id=1
zk-02 ansible_host=10.0.6.11 zk_id=2
zk-03 ansible_host=10.0.6.12 zk_id=3

# ==================== Nginx 负载均衡 + Keepalived ====================
[nginx]
nginx-lb-01 ansible_host=10.0.7.10
nginx-lb-02 ansible_host=10.0.7.11

# ==================== Apache Tomcat 集群 ====================
[tomcat]
tomcat-app-01 ansible_host=10.0.8.10 tomcat_instance=1
tomcat-app-02 ansible_host=10.0.8.11 tomcat_instance=2

# ==================== Elasticsearch 集群 ====================
[elasticsearch]
es-data-01 ansible_host=10.0.9.10
es-data-02 ansible_host=10.0.9.11
es-data-03 ansible_host=10.0.9.12

# ==================== 全局元分组（便于整体操作） ====================
# 将所有中间件主机合并为一个父组
[all_middleware:children]
redis_master
redis_slave
redis_sentinel
mysql_master
mysql_slave
mysql_mha_manager
kafka_brokers
rocketmq_namesrv
rocketmq_broker_master
rocketmq_broker_slave
rabbitmq
zookeeper
nginx
tomcat
elasticsearch

# ==================== 额外变量（示例） ====================
# 可通过主机变量或组变量覆盖全局设置，例如：
# [redis_master:vars]
# redis_port=6380
# redis_password=SpecialMasterPassword