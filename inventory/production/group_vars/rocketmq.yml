# ============================================================
# Apache RocketMQ 部署变量
# ============================================================

# --- 版本 ---
rocketmq_version: "5.1.4"

# --- 安装方式（覆盖全局 install_method） ---
# 可选值: binary | docker_compose
rocketmq_install_method: "{{ install_method }}"

# --- 架构模式 ---
# 可选值: standalone | master_slave | dual_master | dual_master_dual_slave
rocketmq_architecture: "dual_master_dual_slave"

# --- 二进制包下载地址（可自定义） ---
rocketmq_download_url: "https://dist.apache.org/repos/dist/release/rocketmq/{{ rocketmq_version }}/rocketmq-all-{{ rocketmq_version }}-bin-release.zip"

# --- 基础路径 ---
rocketmq_install_dir: "{{ base_install_dir }}/rocketmq"
rocketmq_data_dir: "{{ base_data_dir }}/rocketmq"
rocketmq_log_dir: "{{ base_log_dir }}/rocketmq"

# --- 运行用户 ---
rocketmq_user: "{{ middleware_user }}"
rocketmq_group: "{{ middleware_group }}"

# --- Name Server 配置 ---
rocketmq_namesrv_port: 9876
rocketmq_namesrv_heap: "-Xms512m -Xmx512m"
rocketmq_namesrv_log_level: "ERROR"

# --- Broker 基础配置 ---
rocketmq_broker_port: 10911
rocketmq_broker_heap: "-Xms2g -Xmx2g -XX:+UseG1GC"
rocketmq_broker_log_level: "INFO"

# --- Broker 角色变量（从主机变量获取，也可在此设置默认值） ---
# broker_name:      Broker 名称（主机变量提供）
# broker_role:      SYNC_MASTER / ASYNC_MASTER / SLAVE
# broker_id:        0 表示 Master，非 0 的 Slave ID（自动生成也可）

# --- 集群名称 ---
rocketmq_cluster_name: "DefaultCluster"

# --- 存储配置 ---
rocketmq_store_path_root_dir: "{{ rocketmq_data_dir }}/store"
rocketmq_store_path_commitlog: "{{ rocketmq_store_path_root_dir }}/commitlog"
rocketmq_store_path_consumequeue: "{{ rocketmq_store_path_root_dir }}/consumequeue"
rocketmq_store_path_index: "{{ rocketmq_store_path_root_dir }}/index"
rocketmq_store_path_checkpoint: "{{ rocketmq_store_path_root_dir }}/checkpoint"
rocketmq_store_path_abort: "{{ rocketmq_store_path_root_dir }}/abort"

# --- 磁盘与内存 ---
rocketmq_disk_max_used_space_ratio: 88
rocketmq_mapped_file_size_commitlog: "1G"
rocketmq_mapped_file_size_consume_queue: 300000

# --- 刷盘策略 (ASYNC_FLUSH / SYNC_FLUSH) ---
rocketmq_flush_disk_type: "ASYNC_FLUSH"

# --- 主从同步模式 (ASYNC_MASTER / SYNC_MASTER) ---
rocketmq_broker_role_default: "SYNC_MASTER"

# --- 延迟消息与定时消息 ---
rocketmq_message_delay_level: "1s 5s 10s 30s 1m 2m 3m 4m 5m 6m 7m 8m 9m 10m 20m 30m 1h 2h"

# --- 自动创建 Topic ---
rocketmq_auto_create_topic_enable: true
rocketmq_auto_create_subscription_group: true

# --- ACL 安全 ---
rocketmq_acl_enable: false
rocketmq_acl_global_white_addrs: ""
# rocketmq_acl_accounts:        # 定义在 vault 中

# --- Docker Compose 配置 ---
rocketmq_docker_image: "apache/rocketmq:{{ rocketmq_version }}"
rocketmq_docker_compose_dir: "{{ rocketmq_install_dir }}/compose"

# --- 是否包含系统调优 ---
rocketmq_include_system_tuning: true

# --- 控制台（可选） ---
rocketmq_console_enabled: false
rocketmq_console_port: 8080
rocketmq_console_docker_image: "styletang/rocketmq-console-ng:latest"
rocketmq_console_java_opts: "-Xms256m -Xmx256m"