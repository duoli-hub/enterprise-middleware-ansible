# ============================================================
# Nginx 部署变量
# ============================================================

# --- 版本 ---
nginx_version: "1.24.0"

# --- 安装方式（覆盖全局 install_method） ---
# 可选值: package | compile | docker
nginx_install_method: "{{ install_method }}"

# --- 架构模式 ---
# 可选值: standalone | load_balancer | keepalived_ha
nginx_architecture: "standalone"

# --- 端口 ---
nginx_listen_port: 80
nginx_listen_ssl_port: 443

# --- 路径 ---
nginx_conf_dir: "/etc/nginx"
nginx_log_dir: "{{ base_log_dir }}/nginx"
nginx_pid_dir: "/run"
nginx_web_root: "{{ base_data_dir }}/nginx/html"

# --- 运行用户 ---
nginx_user: "{{ middleware_user }}"
nginx_group: "{{ middleware_group }}"

# --- 编译安装参数（仅当 nginx_install_method == compile 时生效） ---
nginx_compile_configure_arguments: >-
  --prefix=/etc/nginx
  --sbin-path=/usr/sbin/nginx
  --modules-path=/usr/lib64/nginx/modules
  --conf-path=/etc/nginx/nginx.conf
  --error-log-path={{ nginx_log_dir }}/error.log
  --http-log-path={{ nginx_log_dir }}/access.log
  --pid-path={{ nginx_pid_dir }}/nginx.pid
  --lock-path=/var/run/nginx.lock
  --user={{ nginx_user }}
  --group={{ nginx_group }}
  --with-http_ssl_module
  --with-http_v2_module
  --with-http_realip_module
  --with-http_stub_status_module
  --with-http_gzip_static_module
  --with-pcre
  --with-stream
  --with-stream_ssl_module
  --with-http_sub_module
  --with-http_auth_request_module

# --- 性能调优 ---
nginx_worker_processes: "auto"                # 或设置为 CPU 核数
nginx_worker_connections: 65535
nginx_multi_accept: "on"
nginx_use: "epoll"

# --- 事件驱动 ---
nginx_events:
  worker_connections: 65535
  multi_accept: "on"
  use: "epoll"

# --- HTTP 核心配置 ---
nginx_http:
  sendfile: "on"
  tcp_nopush: "on"
  tcp_nodelay: "on"
  keepalive_timeout: 65
  types_hash_max_size: 2048
  server_tokens: "off"
  server_names_hash_bucket_size: 128
  client_max_body_size: "100m"
  client_body_buffer_size: "128k"
  client_header_buffer_size: "4k"
  large_client_header_buffers: "4 32k"
  output_buffers: "2 32k"
  postpone_output: 1460

# --- Gzip 压缩 ---
nginx_gzip:
  enabled: "on"
  min_length: 1000
  comp_level: 5
  types: "text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript"
  vary: "on"
  disable: "msie6"

# --- 缓冲区与超时 ---
nginx_proxy_buffer:
  buffer_size: "32k"
  buffers: "4 64k"
  busy_buffers_size: "128k"
  temp_file_write_size: "256k"
  connect_timeout: 60
  read_timeout: 60
  send_timeout: 60

# --- 日志 ---
nginx_access_log: "{{ nginx_log_dir }}/access.log combined buffer=32k flush=5s"
nginx_error_log: "{{ nginx_log_dir }}/error.log warn"

# --- 状态监控 ---
nginx_status_enabled: true
nginx_status_location: "/nginx_status"
nginx_status_allow: "127.0.0.1"               # 允许访问的 IP，可扩展为列表

# --- 负载均衡配置（当架构为 load_balancer 或 keepalived_ha 时有效） ---
nginx_upstreams:
  - name: "backend"
    algorithm: "least_conn"                   # 支持的算法：round_robin, least_conn, ip_hash
    servers:
      - address: "10.0.8.10"
        port: 8080
        weight: 1
        max_fails: 3
        fail_timeout: 30s
      - address: "10.0.8.11"
        port: 8080
        weight: 1
        max_fails: 3
        fail_timeout: 30s

# --- Tomcat 反向代理模板（示例） ---
nginx_app_servers: "{{ groups['tomcat'] | default([]) }}"
nginx_app_port: 8080

# --- SSL/TLS（若需要，应通过 vault 提供证书路径） ---
nginx_ssl_enabled: false
# nginx_ssl_certificate: "/etc/ssl/certs/server.crt"
# nginx_ssl_certificate_key: "/etc/ssl/private/server.key"

# --- Keepalived 高可用（keepalived_ha 架构专用） ---
nginx_keepalived_interface: "eth0"            # 虚拟 IP 绑定的网卡
nginx_keepalived_priority: "100"              # 可通过主机变量覆盖
nginx_keepalived_virtual_router_id: 51
nginx_keepalived_virtual_ip: "10.0.7.100/24"
nginx_keepalived_auth_pass: "{{ vault_keepalived_auth_pass | default('your_secret') }}"
nginx_keepalived_track_script: "chk_nginx"
nginx_keepalived_notify_script: "/usr/local/bin/notify.sh"

# --- Docker 镜像 ---
nginx_docker_image: "nginx:{{ nginx_version }}-alpine"

# --- 是否包含系统调优 ---
nginx_include_system_tuning: true