# ============================================================
# Apache Kafka 部署变量
# ============================================================

# --- 版本 ---
kafka_version: "3.7.0"
kafka_scala_version: "2.13"

# --- 安装方式（覆盖全局 install_method） ---
# 可选值: binary | docker | docker_compose | k8s_yaml
kafka_install_method: "{{ install_method }}"

# --- 架构模式 ---
# 可选值: standalone | cluster
# 集群通过 kafka_kraft_enabled 决定使用 KRaft 或 ZooKeeper 模式
kafka_architecture: "cluster"

# --- 启用 KRaft 模式（无 ZooKeeper） ---
kafka_kraft_enabled: true

# --- 节点 ID（从主机变量获取） ---
kafka_broker_id: "{{ kafka_broker_id }}"

# --- 端口 ---
kafka_port: 9092
kafka_controller_port: 9093

# --- 监听器配置 ---
kafka_listeners: "PLAINTEXT://0.0.0.0:{{ kafka_port }}"
kafka_advertised_listeners: "PLAINTEXT://{{ ansible_host }}:{{ kafka_port }}"
kafka_inter_broker_listener_name: "PLAINTEXT"
kafka_listener_security_protocol_map:
  PLAINTEXT: PLAINTEXT
  CONTROLLER: PLAINTEXT

# --- 路径 ---
kafka_data_dir: "{{ base_data_dir }}/kafka"
kafka_log_dir: "{{ base_log_dir }}/kafka"

# --- 线程与性能 ---
kafka_network_threads: 3
kafka_io_threads: 8
kafka_socket_send_buffer_bytes: 102400
kafka_socket_receive_buffer_bytes: 102400
kafka_socket_request_max_bytes: 104857600
kafka_num_recovery_threads_per_data_dir: 1

# --- 分区与副本 ---
kafka_num_partitions: 8
kafka_default_replication_factor: 3
kafka_min_insync_replicas: 2
kafka_offsets_topic_replication_factor: 3
kafka_transaction_state_log_replication_factor: 3
kafka_transaction_state_log_min_isr: 2

# --- 日志保留 ---
kafka_log_retention_hours: 168
kafka_log_segment_bytes: 1073741824
kafka_log_retention_check_interval_ms: 300000

# --- ZooKeeper 连接（仅当 kafka_kraft_enabled=false 时生效） ---
kafka_zookeeper_connect: >-
  {%- for host in groups['zookeeper'] -%}
  {{ hostvars[host]['ansible_host'] }}:2181{% if not loop.last %},{% endif %}
  {%- endfor -%}

# --- JVM 内存 ---
kafka_heap_opts: "-Xmx2G -Xms2G"

# --- Docker 镜像 ---
kafka_docker_image: "confluentinc/cp-kafka:{{ kafka_version }}"

# --- 是否包含系统调优 ---
kafka_include_system_tuning: true