---
# ============================================================
# Redis 部署 Playbook
# 支持 standalone、master_slave、sentinel、cluster 架构
# 执行: ./deploy.sh redis [--arch <架构>] [--method <安装方式>]
# ============================================================

- name: 部署 Redis 集群（所有节点）
  hosts: redis_master:redis_slave:redis_sentinel
  become: true
  gather_facts: true
  vars:
    # 可通过命令行 -e 覆盖这些变量
    redis_architecture: "{{ redis_architecture | default('sentinel') }}"
    redis_install_method: "{{ redis_install_method | default(install_method) }}"
  roles:
    - role: redis
  tags:
    - redis
    - install
    - config