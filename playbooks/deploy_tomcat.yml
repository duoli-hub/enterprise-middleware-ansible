---
# ============================================================
# Apache Tomcat 部署 Playbook
# 支持 standalone、cluster 架构
# 执行: ./deploy.sh tomcat [--arch <架构>] [--method <安装方式>]
# ============================================================

- name: 部署 Tomcat 节点
  hosts: tomcat
  become: true
  gather_facts: true
  vars:
    tomcat_architecture: "{{ tomcat_architecture | default('standalone') }}"
    tomcat_install_method: "{{ tomcat_install_method | default(install_method) }}"
  roles:
    - role: tomcat
  tags:
    - tomcat
    - install
    - config