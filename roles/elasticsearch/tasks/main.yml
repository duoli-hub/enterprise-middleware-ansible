---
# roles/elasticsearch/tasks/main.yml
# Elasticsearch 角色主任务：根据安装方式与架构模式调度子任务
# 支持的安装方式: package, docker, docker_compose, k8s_yaml, k8s_helm
# 支持的架构: standalone, cluster

- name: 设置默认变量（避免未定义错误）
  ansible.builtin.set_fact:
    elasticsearch_install_method: "{{ elasticsearch_install_method | default(install_method) }}"
    elasticsearch_architecture: "{{ elasticsearch_architecture | default('cluster') }}"
  tags: always

- name: 包含系统调优角色
  ansible.builtin.include_role:
    name: common
  when: elasticsearch_include_system_tuning | default(true) | bool
  tags:
    - tuning
    - common

- name: 验证安装方式
  ansible.builtin.fail:
    msg: "不支持的 Elasticsearch 安装方式: {{ elasticsearch_install_method }}"
  when: elasticsearch_install_method not in ['package', 'docker', 'docker_compose', 'k8s_yaml', 'k8s_helm']

- name: 验证架构模式
  ansible.builtin.fail:
    msg: "不支持的 Elasticsearch 架构模式: {{ elasticsearch_architecture }}"
  when: elasticsearch_architecture not in ['standalone', 'cluster']

- name: 开放 Elasticsearch HTTP 端口 (RedHat firewalld)
  ansible.posix.firewalld:
    port: "{{ elasticsearch_http_port }}/tcp"
    permanent: true
    state: enabled
    immediate: true
  when:
    - ansible_os_family == "RedHat"
    - enable_firewall | default(true) | bool
    - disable_firewall_management | default(false) | bool == false
  tags: firewall

- name: 开放 Elasticsearch HTTP 端口 (Debian ufw)
  community.general.ufw:
    rule: allow
    port: "{{ elasticsearch_http_port }}"
    proto: tcp
  when:
    - ansible_os_family == "Debian"
    - enable_firewall | default(true) | bool
    - disable_firewall_management | default(false) | bool == false
  tags: firewall

- name: 开放 Elasticsearch Transport 端口 (RedHat)
  ansible.posix.firewalld:
    port: "{{ elasticsearch_transport_port }}/tcp"
    permanent: true
    state: enabled
    immediate: true
  when:
    - ansible_os_family == "RedHat"
    - enable_firewall | default(true) | bool
    - disable_firewall_management | default(false) | bool == false
  tags: firewall

- name: 开放 Elasticsearch Transport 端口 (Debian)
  community.general.ufw:
    rule: allow
    port: "{{ elasticsearch_transport_port }}"
    proto: tcp
  when:
    - ansible_os_family == "Debian"
    - enable_firewall | default(true) | bool
    - disable_firewall_management | default(false) | bool == false
  tags: firewall

- name: 根据安装方式执行安装
  ansible.builtin.include_tasks: "{{ elasticsearch_install_method }}_install.yml"
  tags: install

- name: 根据架构模式执行配置
  ansible.builtin.include_tasks: "{{ 'cluster.yml' if elasticsearch_architecture == 'cluster' else 'standalone.yml' }}"
  tags: config

- name: 启动并启用 Elasticsearch 服务（systemd 托管方式）
  ansible.builtin.systemd:
    name: elasticsearch
    state: started
    enabled: true
    daemon_reload: true
  when: elasticsearch_install_method == 'package'
  tags: service