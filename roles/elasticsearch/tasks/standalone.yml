---
# roles/elasticsearch/tasks/standalone.yml
# Elasticsearch 单机架构配置
# 适用于 elasticsearch_architecture == 'standalone'
# 生成 elasticsearch.yml 和 jvm.options 并启动服务

- name: 确保 Elasticsearch 配置目录存在
  ansible.builtin.file:
    path: /etc/elasticsearch
    state: directory
    owner: root
    group: elasticsearch
    mode: "0750"

- name: 生成 Elasticsearch 主配置文件（单机模式）
  ansible.builtin.template:
    src: elasticsearch.yml.j2
    dest: /etc/elasticsearch/elasticsearch.yml
    owner: root
    group: elasticsearch
    mode: "0640"
  notify: restart elasticsearch

- name: 生成 JVM 自定义选项文件
  ansible.builtin.template:
    src: jvm.options.j2
    dest: /etc/elasticsearch/jvm.options.d/custom.options
    owner: root
    group: elasticsearch
    mode: "0640"
  notify: restart elasticsearch

- name: 启动并启用 Elasticsearch 服务（仅包安装）
  ansible.builtin.systemd:
    name: elasticsearch
    state: started
    enabled: true
    daemon_reload: true
  when: elasticsearch_install_method == 'package'