---
# roles/kafka/defaults/main.yml
# Apache Kafka 角色默认变量（最低优先级，可被 group_vars / host_vars 覆盖）

# --- 版本与包名 ---
kafka_version: "3.7.0"
kafka_scala_version: "2.13"

# --- 安装与架构 ---
kafka_install_method: "binary"
kafka_architecture: "cluster"
kafka_kraft_enabled: true                    # 使用 KRaft 替代 ZooKeeper

# --- 节点 ID（建议通过主机变量指定） ---
kafka_broker_id: 1

# --- 端口 ---
kafka_port: 9092
kafka_controller_port: 9093

# --- 监听器 ---
kafka_listeners: "PLAINTEXT://0.0.0.0:9092"
kafka_advertised_listeners: "PLAINTEXT://{{ ansible_host }}:9092"
kafka_inter_broker_listener_name: "PLAINTEXT"
kafka_listener_security_protocol_map:
  PLAINTEXT: PLAINTEXT
  CONTROLLER: PLAINTEXT

# --- 路径 ---
kafka_install_dir: "{{ base_install_dir }}/kafka"
kafka_data_dir: "{{ base_data_dir }}/kafka"
kafka_log_dir: "{{ base_log_dir }}/kafka"

# --- 线程与性能 ---
kafka_network_threads: 3
kafka_io_threads: 8
kafka_socket_send_buffer_bytes: 102400
kafka_socket_receive_buffer_bytes: 102400
kafka_socket_request_max_bytes: 104857600
kafka_num_recovery_threads_per_data_dir: 1

# --- 分区与副本 ---
kafka_num_partitions: 8
kafka_default_replication_factor: 3
kafka_min_insync_replicas: 2
kafka_offsets_topic_replication_factor: 3
kafka_transaction_state_log_replication_factor: 3
kafka_transaction_state_log_min_isr: 2

# --- 日志保留 ---
kafka_log_retention_hours: 168
kafka_log_segment_bytes: 1073741824
kafka_log_retention_check_interval_ms: 300000

# --- ZooKeeper 连接（仅当 kafka_kraft_enabled=false 时生效） ---
kafka_zookeeper_connect: "localhost:2181"

# --- JVM 内存 ---
kafka_heap_opts: "-Xmx2G -Xms2G"

# --- Docker 镜像 ---
kafka_docker_image: "confluentinc/cp-kafka:{{ kafka_version }}"
kafka_docker_force_pull: false

# --- 功能开关 ---
kafka_include_system_tuning: true
kafka_update_path: true

# --- 用户与组 ---
kafka_user: "{{ middleware_user }}"
kafka_group: "{{ middleware_group }}"