---
# roles/kafka/tasks/main.yml
# Apache Kafka 角色主任务：根据安装方式与集群模式调度子任务
# 支持的安装方式: binary, docker, docker_compose, k8s_yaml
# 支持的架构: standalone, cluster（内部通过 kafka_kraft_enabled 区分 KRaft/ZooKeeper）

- name: 设置默认变量（避免未定义错误）
  ansible.builtin.set_fact:
    kafka_install_method: "{{ kafka_install_method | default(install_method) }}"
    kafka_architecture: "{{ kafka_architecture | default('cluster') }}"
    kafka_kraft_enabled: "{{ kafka_kraft_enabled | default(true) }}"
  tags: always

- name: 包含系统调优角色
  ansible.builtin.include_role:
    name: common
  when: kafka_include_system_tuning | default(true) | bool
  tags:
    - tuning
    - common

- name: 验证安装方式
  ansible.builtin.fail:
    msg: "不支持的 Kafka 安装方式: {{ kafka_install_method }}"
  when: kafka_install_method not in ['binary', 'docker', 'docker_compose', 'k8s_yaml']

- name: 验证架构模式
  ansible.builtin.fail:
    msg: "不支持的 Kafka 架构模式: {{ kafka_architecture }}"
  when: kafka_architecture not in ['standalone', 'cluster']

- name: 检查 KRaft/ZooKeeper 模式一致性
  ansible.builtin.fail:
    msg: "KRaft 模式要求至少 {{ kafka_min_brokers | default(3) }} 个 broker，当前定义 {{ groups['kafka_brokers'] | length }} 个"
  when:
    - kafka_kraft_enabled | bool
    - kafka_architecture == 'cluster'
    - groups['kafka_brokers'] | length < (kafka_min_brokers | default(1))

- name: 开放 Kafka 客户端端口 (RedHat firewalld)
  ansible.posix.firewalld:
    port: "{{ kafka_port }}/tcp"
    permanent: true
    state: enabled
    immediate: true
  when:
    - ansible_os_family == "RedHat"
    - enable_firewall | default(true) | bool
    - disable_firewall_management | default(false) | bool == false
  tags: firewall

- name: 开放 Kafka 客户端端口 (Debian ufw)
  community.general.ufw:
    rule: allow
    port: "{{ kafka_port }}"
    proto: tcp
  when:
    - ansible_os_family == "Debian"
    - enable_firewall | default(true) | bool
    - disable_firewall_management | default(false) | bool == false
  tags: firewall

- name: 开放 Kafka 控制器端口（仅 KRaft）
  ansible.posix.firewalld:
    port: "{{ kafka_controller_port }}/tcp"
    permanent: true
    state: enabled
    immediate: true
  when:
    - ansible_os_family == "RedHat"
    - kafka_kraft_enabled | bool
    - enable_firewall | default(true) | bool
    - disable_firewall_management | default(false) | bool == false
  tags: firewall

- name: 安装 Java（所有安装方式都需要）
  ansible.builtin.include_tasks: install_java.yml
  tags: java

- name: 根据安装方式执行安装
  ansible.builtin.include_tasks: "{{ kafka_install_method }}_install.yml"
  tags: install

- name: 根据架构及 KRaft 模式执行配置
  ansible.builtin.include_tasks: "{{ 'kraft_cluster.yml' if (kafka_kraft_enabled | bool) and kafka_architecture == 'cluster' else 'zookeeper_cluster.yml' if not (kafka_kraft_enabled | bool) and kafka_architecture == 'cluster' else 'standalone.yml' }}"
  tags: config

- name: 启动并启用 Kafka 服务
  ansible.builtin.systemd:
    name: kafka
    state: started
    enabled: true
    daemon_reload: true
  when: kafka_install_method == 'binary'
  tags: service