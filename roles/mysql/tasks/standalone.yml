---
# roles/mysql/tasks/standalone.yml
# MySQL 单机架构配置
# 生成最终配置文件，并确保 MySQL 服务运行

- name: 确保 MySQL 配置目录存在
  ansible.builtin.file:
    path: /etc/my.cnf.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: 生成 MySQL 配置文件（单机模式）
  ansible.builtin.template:
    src: my.cnf.j2
    dest: /etc/my.cnf
    owner: root
    group: root
    mode: "0644"
  notify: restart mysql

- name: 生成 MySQL systemd 服务文件（单机）
  ansible.builtin.template:
    src: mysql.service.j2
    dest: /etc/systemd/system/mysqld.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - reload systemd
    - restart mysql
  when: mysql_install_method in ['binary', 'package']

- name: 启动并启用 MySQL 服务
  ansible.builtin.systemd:
    name: "{{ 'mysqld' if ansible_os_family == 'RedHat' or mysql_install_method == 'binary' else 'mysql' }}"
    state: started
    enabled: true
    daemon_reload: true
  when: mysql_install_method in ['binary', 'package']