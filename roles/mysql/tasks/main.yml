---
# roles/mysql/tasks/main.yml
# MySQL 角色主任务：根据安装方式与架构模式调度子任务
# 支持的安装方式: binary, package, docker, docker_compose
# 支持的架构: standalone, master_slave, mha

- name: 设置默认变量（避免未定义错误）
  ansible.builtin.set_fact:
    mysql_install_method: "{{ mysql_install_method | default(install_method) }}"
    mysql_architecture: "{{ mysql_architecture | default('standalone') }}"
  tags: always

- name: 包含系统调优角色
  ansible.builtin.include_role:
    name: common
  when: mysql_include_system_tuning | default(true) | bool
  tags:
    - tuning
    - common

- name: 验证安装方式
  ansible.builtin.fail:
    msg: "不支持的 MySQL 安装方式: {{ mysql_install_method }}"
  when: mysql_install_method not in ['binary', 'package', 'docker', 'docker_compose']

- name: 验证架构模式
  ansible.builtin.fail:
    msg: "不支持的 MySQL 架构模式: {{ mysql_architecture }}"
  when: mysql_architecture not in ['standalone', 'master_slave', 'mha']

- name: 开放 MySQL 端口 (RedHat firewalld)
  ansible.posix.firewalld:
    port: "{{ mysql_port }}/tcp"
    permanent: true
    state: enabled
    immediate: true
  when:
    - ansible_os_family == "RedHat"
    - enable_firewall | default(true) | bool
    - disable_firewall_management | default(false) | bool == false
  tags: firewall

- name: 开放 MySQL 端口 (Debian ufw)
  community.general.ufw:
    rule: allow
    port: "{{ mysql_port }}"
    proto: tcp
  when:
    - ansible_os_family == "Debian"
    - enable_firewall | default(true) | bool
    - disable_firewall_management | default(false) | bool == false
  tags: firewall

- name: 根据安装方式执行安装
  ansible.builtin.include_tasks: "{{ mysql_install_method }}_install.yml"
  tags: install

- name: 根据架构模式执行配置
  ansible.builtin.include_tasks: "{{ mysql_architecture }}.yml"
  tags: config

- name: 启动并启用 MySQL 服务（systemd 托管方式）
  ansible.builtin.systemd:
    name: mysqld
    state: started
    enabled: true
    daemon_reload: true
  when: mysql_install_method in ['binary', 'package']
  tags: service