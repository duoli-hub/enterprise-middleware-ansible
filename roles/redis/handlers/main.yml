---
# roles/redis/handlers/main.yml
# Redis 服务处理器：重启、重载等动作

- name: reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: restart redis
  ansible.builtin.systemd:
    name: "{{ 'redis-server' if (ansible_os_family == 'Debian' and redis_install_method == 'package') else 'redis' }}"
    state: restarted
    daemon_reload: true
  when: redis_install_method in ['binary', 'package', 'compile']

- name: restart redis-sentinel
  ansible.builtin.systemd:
    name: redis-sentinel
    state: restarted
    daemon_reload: true
  when: redis_architecture == 'sentinel' and redis_install_method in ['binary', 'package', 'compile']

- name: restart docker redis
  community.docker.docker_container:
    name: redis
    state: restarted
  when: redis_install_method == 'docker'

- name: restart redis compose
  community.docker.docker_compose_v2:
    project_src: "{{ redis_compose_dir | default(base_install_dir + '/redis-compose') }}"
    state: present
    restarted: true
  when: redis_install_method == 'docker_compose'