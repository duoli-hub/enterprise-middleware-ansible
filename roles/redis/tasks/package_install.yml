---
# roles/redis/tasks/package_install.yml
# Redis 包管理器安装：通过 apt/yum 安装系统自带的 Redis 包
# 适用于 RedHat 和 Debian 系发行版

- name: 安装 Redis - RedHat 系
  ansible.builtin.yum:
    name:
      - redis
    state: present
    update_cache: true
  when: ansible_os_family == "RedHat"
  tags:
    - package
    - install

- name: 安装 Redis - Debian 系
  ansible.builtin.apt:
    name:
      - redis-server
    state: present
    update_cache: true
  when: ansible_os_family == "Debian"
  tags:
    - package
    - install

- name: 确保 Redis 配置目录存在
  ansible.builtin.file:
    path: /etc/redis
    state: directory
    owner: root
    group: "{{ redis_group | default(middleware_group) }}"
    mode: "0750"

- name: 生成 Redis 配置文件
  ansible.builtin.template:
    src: redis.conf.j2
    dest: /etc/redis/redis.conf
    owner: root
    group: "{{ redis_group | default(middleware_group) }}"
    mode: "0640"
  notify: restart redis

- name: 修改 systemd 服务文件以使用自定义配置（Debian/Ubuntu 默认读取 /etc/redis/redis.conf）
  ansible.builtin.lineinfile:
    path: /lib/systemd/system/redis-server.service
    regexp: '^ExecStart='
    line: 'ExecStart=/usr/bin/redis-server /etc/redis/redis.conf --supervised systemd'
  when:
    - ansible_os_family == "Debian"
    - redis_override_systemd | default(true) | bool
  notify:
    - reload systemd
    - restart redis

- name: 启动并启用 Redis 服务
  ansible.builtin.systemd:
    name: "{{ 'redis' if ansible_os_family == 'RedHat' else 'redis-server' }}"
    state: started
    enabled: true
    daemon_reload: true