---
# roles/redis/tasks/helm_install.yml
# 使用 Helm Chart 部署 Redis
# 支持 standalone、sentinel、cluster —— 由 Chart values 控制
# 依赖 kubernetes.core 集合

- name: 检查 Kubernetes 连接
  kubernetes.core.k8s_info:
    kind: Namespace
    name: kube-system
  register: k8s_connection

- name: 设置默认 Helm 变量
  ansible.builtin.set_fact:
    redis_helm_repo_name: "{{ redis_helm_repo_name | default('bitnami') }}"
    redis_helm_repo_url: "{{ redis_helm_repo_url | default('https://charts.bitnami.com/bitnami') }}"
    redis_helm_chart: "{{ redis_helm_chart | default('bitnami/redis') }}"
    redis_helm_chart_version: "{{ redis_helm_chart_version | default('18.6.1') }}"
    redis_helm_namespace: "{{ redis_helm_namespace | default('redis') }}"
    redis_helm_release_name: "{{ redis_helm_release_name | default('redis-cluster') }}"

- name: 创建命名空间
  kubernetes.core.k8s:
    name: "{{ redis_helm_namespace }}"
    api_version: v1
    kind: Namespace
    state: present

- name: 添加 Helm 仓库
  kubernetes.core.helm_repository:
    name: "{{ redis_helm_repo_name }}"
    url: "{{ redis_helm_repo_url }}"
    force_update: true

- name: 更新仓库缓存
  ansible.builtin.command: helm repo update
  changed_when: false

- name: 部署/升级 Redis Helm Chart
  kubernetes.core.helm:
    name: "{{ redis_helm_release_name }}"
    chart_ref: "{{ redis_helm_chart }}"
    chart_version: "{{ redis_helm_chart_version }}"
    release_namespace: "{{ redis_helm_namespace }}"
    create_namespace: false    # 已单独创建
    values: "{{ redis_helm_values | default({}) }}"
    state: present
    wait: true
    wait_timeout: "{{ redis_helm_wait_timeout | default('10m') }}"
    atomic: "{{ redis_helm_atomic | default(false) }}"
  register: helm_result

- name: 显示 Helm 部署信息
  ansible.builtin.debug:
    var: helm_result.stdout_lines
  when: helm_result.stdout_lines is defined

- name: 等待 Redis Pod 就绪
  kubernetes.core.k8s_info:
    kind: Pod
    namespace: "{{ redis_helm_namespace }}"
    label_selectors:
      - "app.kubernetes.io/instance={{ redis_helm_release_name }}"
  register: redis_pods
  until:
    - redis_pods.resources | length > 0
    - redis_pods.resources | selectattr('status.phase', 'equalto', 'Running') | list | length == redis_pods.resources | length
  retries: 20
  delay: 15
  when: helm_result is success

- name: 获取 Redis 密码（如果 Chart 自动生成）
  kubernetes.core.k8s_info:
    kind: Secret
    namespace: "{{ redis_helm_namespace }}"
    name: "{{ redis_helm_release_name }}-redis"
  register: redis_secret
  failed_when: false

- name: 输出访问信息
  ansible.builtin.debug:
    msg: |
      Redis 通过 Helm 部署完成。
      导出密码: export REDIS_PASSWORD=$(kubectl get secret --namespace {{ redis_helm_namespace }} {{ redis_helm_release_name }}-redis -o jsonpath="{.data.redis-password}" | base64 -d)
      连接地址: {{ redis_helm_release_name }}-redis-master.{{ redis_helm_namespace }}.svc.cluster.local:6379