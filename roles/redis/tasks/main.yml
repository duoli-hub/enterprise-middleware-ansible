---
# roles/redis/tasks/main.yml
# Redis 角色主任务：根据安装方式与架构模式调度子任务
# 支持的安装方式: binary, package, compile, docker, docker_compose, k8s_yaml, k8s_helm
# 支持的架构: standalone, master_slave, sentinel, cluster

- name: 设置默认变量（避免未定义错误）
  ansible.builtin.set_fact:
    redis_install_method: "{{ redis_install_method | default(install_method) }}"
    redis_architecture: "{{ redis_architecture | default('standalone') }}"
  tags: always

- name: 包含系统调优角色
  ansible.builtin.include_role:
    name: common
  when: redis_include_system_tuning | default(true) | bool
  tags:
    - tuning
    - common

- name: 验证安装方式
  ansible.builtin.fail:
    msg: "不支持的 Redis 安装方式: {{ redis_install_method }}"
  when: redis_install_method not in ['binary', 'package', 'compile', 'docker', 'docker_compose', 'k8s_yaml', 'k8s_helm']

- name: 验证架构模式
  ansible.builtin.fail:
    msg: "不支持的 Redis 架构模式: {{ redis_architecture }}"
  when: redis_architecture not in ['standalone', 'master_slave', 'sentinel', 'cluster']

- name: 开放 Redis 主端口 (RedHat firewalld)
  ansible.posix.firewalld:
    port: "{{ redis_port }}/tcp"
    permanent: true
    state: enabled
    immediate: true
  when:
    - ansible_os_family == "RedHat"
    - enable_firewall | default(true) | bool
    - disable_firewall_management | default(false) | bool == false
  tags: firewall

- name: 开放 Redis 主端口 (Debian ufw)
  community.general.ufw:
    rule: allow
    port: "{{ redis_port }}"
    proto: tcp
  when:
    - ansible_os_family == "Debian"
    - enable_firewall | default(true) | bool
    - disable_firewall_management | default(false) | bool == false
  tags: firewall

- name: 根据安装方式执行安装
  ansible.builtin.include_tasks: "{{ redis_install_method }}_install.yml"
  tags: install

- name: 根据架构模式执行配置
  ansible.builtin.include_tasks: "{{ redis_architecture }}.yml"
  tags: config

- name: 启动并启用 Redis 服务（systemd 托管方式）
  ansible.builtin.systemd:
    name: redis
    state: started
    enabled: true
    daemon_reload: true
  when: redis_install_method in ['binary', 'package', 'compile']
  tags: service