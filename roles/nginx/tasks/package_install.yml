---
# roles/nginx/tasks/package_install.yml
# Nginx 包管理器安装：通过 apt/yum 安装系统自带的 Nginx，并应用自定义配置

- name: 安装 Nginx - RedHat 系
  ansible.builtin.yum:
    name:
      - nginx
    state: present
    update_cache: true
  when: ansible_os_family == "RedHat"
  tags:
    - package
    - install

- name: 安装 Nginx - Debian 系
  ansible.builtin.apt:
    name:
      - nginx
    state: present
    update_cache: true
  when: ansible_os_family == "Debian"
  tags:
    - package
    - install

- name: 确保 Nginx 配置目录存在
  ansible.builtin.file:
    path: "{{ nginx_conf_dir | default('/etc/nginx') }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: 确保 Nginx 日志目录存在
  ansible.builtin.file:
    path: "{{ nginx_log_dir }}"
    state: directory
    owner: "{{ nginx_user }}"
    group: "{{ nginx_group }}"
    mode: "0755"

- name: 生成 Nginx 主配置文件
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: "{{ nginx_conf_dir | default('/etc/nginx') }}/nginx.conf"
    owner: root
    group: root
    mode: "0644"
  notify: restart nginx

- name: 清空默认站点配置（避免冲突）
  ansible.builtin.file:
    path: "{{ nginx_conf_dir | default('/etc/nginx') }}/sites-enabled/default"
    state: absent
  when: ansible_os_family == "Debian"

- name: 生成默认站点配置（可选）
  ansible.builtin.template:
    src: default.conf.j2
    dest: "{{ nginx_conf_dir | default('/etc/nginx') }}/conf.d/default.conf"
    owner: root
    group: root
    mode: "0644"
  notify: restart nginx
  when: nginx_create_default_conf | default(true) | bool

- name: 启动并启用 Nginx 服务
  ansible.builtin.systemd:
    name: nginx
    state: started
    enabled: true
    daemon_reload: true