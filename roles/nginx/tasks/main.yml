---
# roles/nginx/tasks/main.yml
# Nginx 角色主任务：根据安装方式与架构模式调度子任务
# 支持的安装方式: package, compile, docker
# 支持的架构: standalone, load_balancer, keepalived_ha

#- name: 设置默认变量（避免未定义错误）
#  ansible.builtin.set_fact:
#    nginx_install_method: "{{ nginx_install_method | default(install_method) }}"
#    nginx_architecture: "{{ nginx_architecture | default('standalone') }}"
#  tags: always

- name: 设置 nginx_install_method 默认值
  ansible.builtin.set_fact:
    nginx_install_method: "{{ install_method }}"
  when: nginx_install_method is not defined

- name: 设置 nginx_architecture 默认值
  ansible.builtin.set_fact:
    nginx_architecture: "standalone"
  when: nginx_architecture is not defined

- name: 包含系统调优角色
  ansible.builtin.include_role:
    name: common
  when: nginx_include_system_tuning | default(true) | bool
  tags:
    - tuning
    - common

- name: 验证安装方式
  ansible.builtin.fail:
    msg: "不支持的 Nginx 安装方式: {{ nginx_install_method }}"
  when: nginx_install_method not in ['package', 'compile', 'docker']

- name: 验证架构模式
  ansible.builtin.fail:
    msg: "不支持的 Nginx 架构模式: {{ nginx_architecture }}"
  when: nginx_architecture not in ['standalone', 'load_balancer', 'keepalived_ha']

- name: 开放 HTTP 端口 (RedHat firewalld)
  ansible.posix.firewalld:
    port: "{{ nginx_listen_port }}/tcp"
    permanent: true
    state: enabled
    immediate: true
  when:
    - ansible_os_family == "RedHat"
    - enable_firewall | default(true) | bool
    - disable_firewall_management | default(false) | bool == false
  tags: firewall

- name: 开放 HTTP 端口 (Debian ufw)
  community.general.ufw:
    rule: allow
    port: "{{ nginx_listen_port }}"
    proto: tcp
  when:
    - ansible_os_family == "Debian"
    - enable_firewall | default(true) | bool
    - disable_firewall_management | default(false) | bool == false
  tags: firewall

- name: 开放 HTTPS 端口 (RedHat firewalld)
  ansible.posix.firewalld:
    port: "{{ nginx_listen_ssl_port }}/tcp"
    permanent: true
    state: enabled
    immediate: true
  when:
    - nginx_ssl_enabled | default(false) | bool
    - ansible_os_family == "RedHat"
    - enable_firewall | default(true) | bool
    - disable_firewall_management | default(false) | bool == false
  tags: firewall

- name: 开放 HTTPS 端口 (Debian ufw)
  community.general.ufw:
    rule: allow
    port: "{{ nginx_listen_ssl_port }}"
    proto: tcp
  when:
    - nginx_ssl_enabled | default(false) | bool
    - ansible_os_family == "Debian"
    - enable_firewall | default(true) | bool
    - disable_firewall_management | default(false) | bool == false
  tags: firewall

- name: 根据安装方式执行安装
  ansible.builtin.include_tasks: "{{ nginx_install_method }}_install.yml"
  tags: install

- name: 根据架构模式执行配置
  ansible.builtin.include_tasks: "{{ nginx_architecture }}.yml"
  tags: config

- name: 启动并启用 Nginx 服务（systemd 托管方式）
  ansible.builtin.systemd:
    name: nginx
    state: started
    enabled: true
    daemon_reload: true
  when: nginx_install_method in ['package', 'compile']
  tags: service