---
# roles/rocketmq/tasks/standalone.yml
# RocketMQ 单机架构：在同一台主机上同时启动 NameServer 和 Broker

- name: 确保 RocketMQ 配置目录存在
  ansible.builtin.file:
    path: "{{ rocketmq_install_dir }}/conf"
    state: directory
    owner: "{{ rocketmq_user }}"
    group: "{{ rocketmq_group }}"
    mode: "0755"

- name: 配置 NameServer 日志
  ansible.builtin.template:
    src: namesrv.properties.j2
    dest: "{{ rocketmq_install_dir }}/conf/namesrv.properties"
    owner: "{{ rocketmq_user }}"
    group: "{{ rocketmq_group }}"
    mode: "0640"
  notify: restart namesrv

- name: 配置 Broker（单机/默认）
  ansible.builtin.template:
    src: broker.conf.j2
    dest: "{{ rocketmq_install_dir }}/conf/broker.conf"
    owner: "{{ rocketmq_user }}"
    group: "{{ rocketmq_group }}"
    mode: "0640"
  notify: restart broker

- name: 创建 systemd 服务文件 - NameServer
  ansible.builtin.template:
    src: rocketmq-namesrv.service.j2
    dest: /etc/systemd/system/rocketmq-namesrv.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - reload systemd
    - restart namesrv

- name: 创建 systemd 服务文件 - Broker
  ansible.builtin.template:
    src: rocketmq-broker.service.j2
    dest: /etc/systemd/system/rocketmq-broker.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - reload systemd
    - restart broker

- name: 启动并启用 NameServer
  ansible.builtin.systemd:
    name: rocketmq-namesrv
    state: started
    enabled: true
    daemon_reload: true
  when: rocketmq_install_method in ['binary']

- name: 启动并启用 Broker
  ansible.builtin.systemd:
    name: rocketmq-broker
    state: started
    enabled: true
    daemon_reload: true
  when: rocketmq_install_method in ['binary']