---
# roles/rabbitmq/tasks/standalone.yml
# RabbitMQ 单机架构配置
# 适用于 rabbitmq_architecture == 'standalone'
# 负责生成配置文件、启动服务并应用基础安全及策略

- name: 确保 RabbitMQ 配置目录存在
  ansible.builtin.file:
    path: /etc/rabbitmq
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: 生成 RabbitMQ 主配置文件（单机模式）
  ansible.builtin.template:
    src: rabbitmq.conf.j2
    dest: /etc/rabbitmq/rabbitmq.conf
    owner: root
    group: root
    mode: "0640"
  notify: restart rabbitmq

- name: 启动并启用 RabbitMQ 服务（仅包安装方式）
  ansible.builtin.systemd:
    name: rabbitmq-server
    state: started
    enabled: true
    daemon_reload: true
  when: rabbitmq_install_method == 'package'

- name: 等待 RabbitMQ 管理端口就绪
  ansible.builtin.wait_for:
    port: "{{ rabbitmq_management_port }}"
    state: started
    timeout: 120
    delay: 5
  when: rabbitmq_install_method == 'package'

# ---------- 插件管理 ----------
- name: 启用所需 RabbitMQ 插件
  ansible.builtin.shell: rabbitmq-plugins enable {{ item }}
  loop: "{{ rabbitmq_plugins | default(['rabbitmq_management']) }}"
  register: plugin_enable
  changed_when: "'already enabled' not in plugin_enable.stdout"
  when: rabbitmq_install_method == 'package'
  notify: restart rabbitmq

# ---------- 安全与用户管理 ----------
- name: 创建 RabbitMQ 管理员用户
  community.rabbitmq.rabbitmq_user:
    user: "{{ rabbitmq_admin_user }}"
    password: "{{ rabbitmq_admin_password }}"
    tags: administrator
    state: present
    update_password: always
  when:
    - rabbitmq_install_method == 'package'
    - rabbitmq_admin_user is defined
    - rabbitmq_admin_password is defined

- name: 删除默认 guest 用户
  community.rabbitmq.rabbitmq_user:
    user: guest
    state: absent
  when:
    - rabbitmq_install_method == 'package'
    - rabbitmq_remove_guest | default(true) | bool

# ---------- 虚拟主机与权限 ----------
- name: 创建默认虚拟主机
  community.rabbitmq.rabbitmq_vhost:
    name: "{{ rabbitmq_default_vhost | default('/') }}"
    state: present
  when: rabbitmq_install_method == 'package'

- name: 设置管理员对虚拟主机的完全访问权限
  community.rabbitmq.rabbitmq_user_permissions:
    user: "{{ rabbitmq_admin_user }}"
    vhost: "{{ rabbitmq_default_vhost | default('/') }}"
    configure_priv: ".*"
    read_priv: ".*"
    write_priv: ".*"
    state: present
  when:
    - rabbitmq_install_method == 'package'
    - rabbitmq_admin_user is defined

# ---------- 策略定义 ----------
- name: 应用高可用策略（单机环境下默认不强制）
  community.rabbitmq.rabbitmq_policy:
    name: "{{ item.name }}"
    pattern: "{{ item.pattern }}"
    tags: "{{ item.tags }}"
    state: present
  loop: "{{ rabbitmq_policies | default([]) }}"
  when: rabbitmq_install_method == 'package'