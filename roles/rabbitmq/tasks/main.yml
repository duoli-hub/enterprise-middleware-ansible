---
# roles/rabbitmq/tasks/main.yml
# RabbitMQ 角色主任务：根据安装方式与架构模式调度子任务
# 支持的安装方式: package, docker, docker_compose
# 支持的架构: standalone, cluster

- name: 设置默认变量（避免未定义错误）
  ansible.builtin.set_fact:
    rabbitmq_install_method: "{{ rabbitmq_install_method | default(install_method) }}"
    rabbitmq_architecture: "{{ rabbitmq_architecture | default('standalone') }}"
  tags: always

- name: 包含系统调优角色
  ansible.builtin.include_role:
    name: common
  when: rabbitmq_include_system_tuning | default(true) | bool
  tags:
    - tuning
    - common

- name: 验证安装方式
  ansible.builtin.fail:
    msg: "不支持的 RabbitMQ 安装方式: {{ rabbitmq_install_method }}"
  when: rabbitmq_install_method not in ['package', 'docker', 'docker_compose']

- name: 验证架构模式
  ansible.builtin.fail:
    msg: "不支持的 RabbitMQ 架构模式: {{ rabbitmq_architecture }}"
  when: rabbitmq_architecture not in ['standalone', 'cluster']

- name: 开放 RabbitMQ AMQP 端口 (RedHat firewalld)
  ansible.posix.firewalld:
    port: "{{ rabbitmq_amqp_port }}/tcp"
    permanent: true
    state: enabled
    immediate: true
  when:
    - ansible_os_family == "RedHat"
    - enable_firewall | default(true) | bool
    - disable_firewall_management | default(false) | bool == false
  tags: firewall

- name: 开放 RabbitMQ AMQP 端口 (Debian ufw)
  community.general.ufw:
    rule: allow
    port: "{{ rabbitmq_amqp_port }}"
    proto: tcp
  when:
    - ansible_os_family == "Debian"
    - enable_firewall | default(true) | bool
    - disable_firewall_management | default(false) | bool == false
  tags: firewall

- name: 开放 RabbitMQ Management 端口 (RedHat)
  ansible.posix.firewalld:
    port: "{{ rabbitmq_management_port }}/tcp"
    permanent: true
    state: enabled
    immediate: true
  when:
    - ansible_os_family == "RedHat"
    - enable_firewall | default(true) | bool
    - disable_firewall_management | default(false) | bool == false
  tags: firewall

- name: 开放 RabbitMQ Management 端口 (Debian)
  community.general.ufw:
    rule: allow
    port: "{{ rabbitmq_management_port }}"
    proto: tcp
  when:
    - ansible_os_family == "Debian"
    - enable_firewall | default(true) | bool
    - disable_firewall_management | default(false) | bool == false
  tags: firewall

- name: 开放 RabbitMQ 集群端口 (RedHat)
  ansible.posix.firewalld:
    port: "{{ item }}/tcp"
    permanent: true
    state: enabled
    immediate: true
  loop:
    - "{{ rabbitmq_epmd_port }}"
    - "{{ rabbitmq_dist_port_range }}"
  when:
    - rabbitmq_architecture == 'cluster'
    - ansible_os_family == "RedHat"
    - enable_firewall | default(true) | bool
    - disable_firewall_management | default(false) | bool == false
  tags: firewall

- name: 开放 RabbitMQ 集群端口 (Debian)
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop:
    - "{{ rabbitmq_epmd_port }}"
    - "{{ rabbitmq_dist_port_range }}"
  when:
    - rabbitmq_architecture == 'cluster'
    - ansible_os_family == "Debian"
    - enable_firewall | default(true) | bool
    - disable_firewall_management | default(false) | bool == false
  tags: firewall

- name: 根据安装方式执行安装
  ansible.builtin.include_tasks: "{{ rabbitmq_install_method }}_install.yml"
  tags: install

- name: 根据架构模式执行配置
  ansible.builtin.include_tasks: "{{ rabbitmq_architecture }}.yml"
  tags: config

- name: 启动并启用 RabbitMQ 服务（systemd 托管方式）
  ansible.builtin.systemd:
    name: rabbitmq-server
    state: started
    enabled: true
    daemon_reload: true
  when: rabbitmq_install_method == 'package'
  tags: service