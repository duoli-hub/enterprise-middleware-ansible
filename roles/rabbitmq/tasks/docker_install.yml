---
# roles/rabbitmq/tasks/docker_install.yml
# RabbitMQ Docker 安装方式：拉取镜像、创建目录、运行容器

- name: 安装 Docker（如果未安装）
  include_tasks: install_docker.yml
  when: docker_installed is not defined or not docker_installed

- name: 创建 RabbitMQ 数据目录（宿主机）
  ansible.builtin.file:
    path: "{{ rabbitmq_data_dir }}"
    state: directory
    owner: "{{ rabbitmq_user }}"
    group: "{{ rabbitmq_group }}"
    mode: "0750"

- name: 创建 RabbitMQ 日志目录（宿主机）
  ansible.builtin.file:
    path: "{{ rabbitmq_log_dir }}"
    state: directory
    owner: "{{ rabbitmq_user }}"
    group: "{{ rabbitmq_group }}"
    mode: "0750"

- name: 创建 RabbitMQ 配置目录（宿主机）
  ansible.builtin.file:
    path: /etc/rabbitmq
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: 生成 RabbitMQ 配置文件（挂载进容器）
  ansible.builtin.template:
    src: rabbitmq.conf.j2
    dest: /etc/rabbitmq/rabbitmq.conf
    owner: root
    group: root
    mode: "0644"
  notify: restart docker rabbitmq

- name: 登录私有镜像仓库（可选）
  community.docker.docker_login:
    registry_url: "{{ docker_registry_url | default(omit) }}"
    username: "{{ docker_registry_username | default(omit) }}"
    password: "{{ docker_registry_password | default(omit) }}"
  when: docker_registry_url is defined and docker_registry_username is defined
  no_log: true

- name: 拉取 RabbitMQ Docker 镜像
  community.docker.docker_image:
    name: "{{ rabbitmq_docker_image }}"
    source: pull
    tag: "{{ rabbitmq_docker_image_tag | default(omit) }}"
    force_source: "{{ rabbitmq_docker_force_pull | default(false) }}"
  register: image_pull_result

- name: 运行 RabbitMQ 容器
  community.docker.docker_container:
    name: rabbitmq
    image: "{{ rabbitmq_docker_image }}"
    state: started
    restart_policy: always
    container_default_behavior: no_defaults
    networks:
      - name: bridge
    ports:
      - "{{ rabbitmq_amqp_port }}:5672"
      - "{{ rabbitmq_management_port }}:15672"
      - "{{ rabbitmq_epmd_port }}:4369"
      - "{{ rabbitmq_dist_port_range }}:25672"
    volumes:
      - "{{ rabbitmq_data_dir }}:/var/lib/rabbitmq"
      - /etc/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - "{{ rabbitmq_log_dir }}:/var/log/rabbitmq"
    env:
      RABBITMQ_DEFAULT_USER: "{{ rabbitmq_admin_user }}"
      RABBITMQ_DEFAULT_PASS: "{{ rabbitmq_admin_password }}"
      RABBITMQ_ERLANG_COOKIE: "{{ rabbitmq_erlang_cookie }}"
      RABBITMQ_VM_MEMORY_HIGH_WATERMARK: "{{ rabbitmq_vm_memory_high_watermark_relative }}"
      RABBITMQ_DISK_FREE_LIMIT: "{{ rabbitmq_disk_free_limit_absolute }}"
      TZ: "{{ timezone | default('Asia/Shanghai') }}"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  notify: restart docker rabbitmq

- name: 等待 RabbitMQ 容器健康检查通过
  ansible.builtin.command: docker exec rabbitmq rabbitmq-diagnostics ping
  register: rabbitmq_ping
  changed_when: false
  retries: 20
  delay: 5
  until: rabbitmq_ping.rc == 0
  tags: verify