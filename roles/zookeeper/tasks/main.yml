---
# roles/zookeeper/tasks/main.yml
# Apache ZooKeeper 角色主任务：根据安装方式与架构模式调度子任务
# 支持的安装方式: binary, docker
# 支持的架构: standalone, cluster

- name: 设置默认变量（避免未定义错误）
  ansible.builtin.set_fact:
    zookeeper_install_method: "{{ zookeeper_install_method | default(install_method) }}"
    zookeeper_architecture: "{{ zookeeper_architecture | default('cluster') }}"
  tags: always

- name: 包含系统调优角色
  ansible.builtin.include_role:
    name: common
  when: zookeeper_include_system_tuning | default(true) | bool
  tags:
    - tuning
    - common

- name: 验证安装方式
  ansible.builtin.fail:
    msg: "不支持的 ZooKeeper 安装方式: {{ zookeeper_install_method }}"
  when: zookeeper_install_method not in ['binary', 'docker']

- name: 验证架构模式
  ansible.builtin.fail:
    msg: "不支持的 ZooKeeper 架构模式: {{ zookeeper_architecture }}"
  when: zookeeper_architecture not in ['standalone', 'cluster']

- name: 开放 ZooKeeper 客户端端口 (RedHat firewalld)
  ansible.posix.firewalld:
    port: "{{ zookeeper_client_port }}/tcp"
    permanent: true
    state: enabled
    immediate: true
  when:
    - ansible_os_family == "RedHat"
    - enable_firewall | default(true) | bool
    - disable_firewall_management | default(false) | bool == false
  tags: firewall

- name: 开放 ZooKeeper 客户端端口 (Debian ufw)
  community.general.ufw:
    rule: allow
    port: "{{ zookeeper_client_port }}"
    proto: tcp
  when:
    - ansible_os_family == "Debian"
    - enable_firewall | default(true) | bool
    - disable_firewall_management | default(false) | bool == false
  tags: firewall

- name: 开放 ZooKeeper 集群通信端口 (RedHat) - 仅集群模式
  ansible.posix.firewalld:
    port: "{{ item }}/tcp"
    permanent: true
    state: enabled
    immediate: true
  loop:
    - "{{ zookeeper_peer_port }}"
    - "{{ zookeeper_leader_port }}"
  when:
    - zookeeper_architecture == 'cluster'
    - ansible_os_family == "RedHat"
    - enable_firewall | default(true) | bool
    - disable_firewall_management | default(false) | bool == false
  tags: firewall

- name: 开放 ZooKeeper 集群通信端口 (Debian) - 仅集群模式
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop:
    - "{{ zookeeper_peer_port }}"
    - "{{ zookeeper_leader_port }}"
  when:
    - zookeeper_architecture == 'cluster'
    - ansible_os_family == "Debian"
    - enable_firewall | default(true) | bool
    - disable_firewall_management | default(false) | bool == false
  tags: firewall

- name: 根据安装方式执行安装
  ansible.builtin.include_tasks: "{{ zookeeper_install_method }}_install.yml"
  tags: install

- name: 根据架构模式执行配置
  ansible.builtin.include_tasks: "{{ 'cluster.yml' if zookeeper_architecture == 'cluster' else 'standalone.yml' }}"
  tags: config

- name: 启动并启用 ZooKeeper 服务（systemd 托管方式）
  ansible.builtin.systemd:
    name: zookeeper
    state: started
    enabled: true
    daemon_reload: true
  when: zookeeper_install_method == 'binary'
  tags: service